name: Security

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    # Run a full scan every Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write  # required for SARIF uploads to GitHub Security tab

jobs:
  # ── Trivy: filesystem CVE scan + IaC misconfiguration ───────────────────────
  trivy:
    name: Trivy (filesystem + IaC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy filesystem results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-fs.sarif"
          category: "trivy-filesystem"

      - name: Trivy — IaC misconfiguration scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"

      - name: Upload Trivy IaC results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-iac.sarif"
          category: "trivy-iac"

  # ── Checkov: Terraform security best-practices ──────────────────────────────
  checkov:
    name: Checkov (Terraform)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          # Soft-fail keeps the workflow green on first adoption;
          # remove this line once all findings are resolved or suppressed
          soft_fail: false
          quiet: true

      - name: Upload Checkov results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: "checkov"

  # ── Bandit: Python SAST ──────────────────────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r app/lambda_function.py \
            --format sarif \
            --output bandit.sarif \
            --severity-level medium \
            --confidence-level medium

      - name: Upload Bandit results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: "bandit"

  # ── Gitleaks: secret / credential leak detection ────────────────────────────
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── CodeQL: semantic code analysis ──────────────────────────────────────────
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "codeql-python"
